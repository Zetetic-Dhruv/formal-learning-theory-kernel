name: Blueprint

on:
  push:
    branches: [main]
    paths:
      - 'blueprint/src/**'
      - 'docs/index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Build blueprint PDF
        uses: xu-cheng/texlive-action@v2
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:latest
          run: |
            cd blueprint/src
            mkdir -p ../print
            xelatex -output-directory=../print -interaction=nonstopmode print.tex || true
            cp references.bib ../print/
            (cd ../print && bibtex print) || true
            xelatex -output-directory=../print -interaction=nonstopmode print.tex || true
            xelatex -output-directory=../print -interaction=nonstopmode print.tex || true
            test -f ../print/print.pdf || (echo "PDF build failed" && exit 1)

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-deploy

      - name: Deploy PDF and landing page
        run: |
          cp docs/index.html gh-pages-deploy/index.html
          cp blueprint/print/print.pdf gh-pages-deploy/blueprint.pdf
          rm -rf gh-pages-deploy/blueprint 2>/dev/null || true

      - name: Push to gh-pages
        working-directory: gh-pages-deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy blueprint PDF from ${{ github.sha }}"
          git pull --rebase origin gh-pages
          git push
