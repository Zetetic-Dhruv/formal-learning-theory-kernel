name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: lean-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lean-

      - name: Build
        run: lake build

      - name: Count sorrys
        run: |
          echo "=== Sorry check ==="
          # Match only sorry as a standalone tactic: lines where sorry is the
          # entire statement (possibly indented), not in comments or substrings
          SORRY_COUNT=$(grep -rn --include="*.lean" -E '^[[:space:]]*sorry[[:space:]]*$' FLT_Proofs/ | wc -l | tr -d ' ')
          echo "Found $SORRY_COUNT sorry tactics in .lean files"
          if [ "$SORRY_COUNT" -gt 2 ]; then
            echo "::error::Sorry count ($SORRY_COUNT) exceeds the 2 known sorrys. New sorrys introduced."
            exit 1
          fi
          echo "Sorry count within expected range (2 known: vcdim_finite_imp_compression, bhmz_middle_branch)"

      - name: Verify metrics
        run: |
          echo "=== Metrics check ==="
          LINES=$(find FLT_Proofs -name "*.lean" | xargs wc -l | tail -1 | awk '{print $1}')
          PUB_THM=$(grep -rn --include="*.lean" -E '^(theorem|lemma) ' FLT_Proofs/ | wc -l | tr -d ' ')
          PRIV_THM=$(grep -rn --include="*.lean" -E '^private (theorem|lemma) ' FLT_Proofs/ | wc -l | tr -d ' ')
          TOTAL_THM=$((PUB_THM + PRIV_THM))
          DEFS=$(grep -rn --include="*.lean" -E '^(def |noncomputable def |private def |abbrev )' FLT_Proofs/ | wc -l | tr -d ' ')
          STRUCTS=$(grep -rn --include="*.lean" -E '^structure ' FLT_Proofs/ | wc -l | tr -d ' ')
          FILES=$(find FLT_Proofs -name "*.lean" | wc -l | tr -d ' ')
          echo "Lines: $LINES | Theorems: $TOTAL_THM ($PUB_THM pub + $PRIV_THM priv) | Defs: $DEFS | Structs: $STRUCTS | Files: $FILES"
