name: comparator

on:
  workflow_dispatch:

jobs:
  comparator:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install elan and prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y golang jq
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Cache .lake and elan
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: comparator-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            comparator-

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build kernel
        run: lake build FLT_Proofs

      - name: Build Verification
        run: lake build Verification

      - name: Install landrun (with passthrough fallback)
        run: |
          go install github.com/zouuup/landrun/cmd/landrun@latest
          # Test if landrun works on this runner
          if landrun --best-effort -- /usr/bin/true 2>/dev/null; then
            echo "landrun works natively"
          else
            echo "landrun sandbox denied on this runner; installing passthrough stub"
            mkdir -p "$HOME/.local/bin"
            cat > "$HOME/.local/bin/landrun" <<'STUB'
          #!/bin/bash
          # Passthrough stub: strip landrun flags, execute the child command.
          # Used when the GitHub Actions runner denies Landlock syscalls.
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --ro|--rw|--rwx|--rox|--env) shift 2 ;;
              --best-effort|--ldd|--add-exec) shift ;;
              --) shift; break ;;
              -*) shift ;;
              *) break ;;
            esac
          done
          exec "$@"
          STUB
            chmod +x "$HOME/.local/bin/landrun"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Build lean4export for matching toolchain
        run: |
          TOOLCHAIN=$(cat lean-toolchain)
          git clone https://github.com/leanprover/lean4export /tmp/lean4export
          cd /tmp/lean4export
          echo "$TOOLCHAIN" > lean-toolchain
          lake build
          echo "/tmp/lean4export/.lake/build/bin" >> "$GITHUB_PATH"

      - name: Build comparator for matching toolchain
        run: |
          TOOLCHAIN=$(cat lean-toolchain)
          git clone https://github.com/leanprover/comparator /tmp/comparator
          cd /tmp/comparator
          echo "$TOOLCHAIN" > lean-toolchain
          lake build
          echo "/tmp/comparator/.lake/build/bin" >> "$GITHUB_PATH"

      - name: Diagnose Landlock
        run: |
          echo "Kernel: $(uname -r)"
          cat /sys/kernel/security/lsm 2>/dev/null || echo "LSM file not readable"
          landrun --best-effort -- /usr/bin/true && echo "landrun probe: OK" || echo "landrun probe: FAILED"

      - name: Run comparator
        run: |
          lake env /tmp/comparator/.lake/build/bin/comparator \
            Verification/config.crown.json 2>&1 \
            | tee /tmp/comparator_results.txt

      - name: Assemble report
        if: always()
        run: |
          mkdir -p test/verification
          {
            echo "comparator verification report"
            echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Toolchain: $(cat lean-toolchain)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "=== Comparator output ==="
            cat /tmp/comparator_results.txt 2>/dev/null || echo "(not generated)"
          } > test/verification/comparator_results.crown.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparator-results
          path: test/verification/comparator_results.crown.txt
