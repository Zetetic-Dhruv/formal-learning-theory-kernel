name: landlock-probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Install landrun
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq golang-go
          go install github.com/zouuup/landrun/cmd/landrun@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: "Test 1: landrun with NO paths (expect DENIED)"
        run: |
          landrun --best-effort -- /usr/bin/true 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED (expected)"

      - name: "Test 2: landrun with explicit read paths (expect OK)"
        run: |
          landrun --best-effort \
            --ro / \
            -- /usr/bin/true 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED"

      - name: "Test 3: landrun with typical comparator paths"
        run: |
          landrun --best-effort \
            --ro /usr --ro /lib --ro /lib64 --ro /bin --ro /etc \
            --ro /proc --ro /sys --ro /dev \
            -- /usr/bin/echo "hello from sandbox" 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED"

      - name: "Test 4: sandbox actually restricts (write to read-only)"
        run: |
          landrun --best-effort \
            --ro /usr --ro /lib --ro /lib64 --ro /bin --ro /etc --ro /tmp \
            -- /usr/bin/touch /tmp/should_fail 2>&1 && echo "RESULT: LEAK (bad)" || echo "RESULT: BLOCKED (good)"

      - name: "Test 5: sandbox with rw allows write"
        run: |
          landrun --best-effort \
            --ro /usr --ro /lib --ro /lib64 --ro /bin --ro /etc \
            --rw /tmp \
            -- /usr/bin/touch /tmp/should_succeed 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED"
          test -f /tmp/should_succeed && echo "FILE EXISTS: confirmed" || echo "FILE MISSING"

      - name: "Test 6: landrun with ldd flag (resolve dynamic libs)"
        run: |
          landrun --best-effort -ldd \
            --ro /usr --ro /lib --ro /lib64 --ro /bin --ro /etc \
            -- /usr/bin/echo "ldd mode works" 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED"

      - name: "Test 7: simulate comparator pattern (lake-like binary)"
        run: |
          # Create a dummy script that acts like a build tool
          cat > /tmp/fake_build.sh <<'EOF'
          #!/bin/bash
          echo "Building..."
          ls /usr/bin/env > /dev/null
          echo "Build complete"
          EOF
          chmod +x /tmp/fake_build.sh
          landrun --best-effort -ldd \
            --ro /usr --ro /lib --ro /lib64 --ro /bin --ro /etc \
            --ro /tmp/fake_build.sh \
            --rw /tmp/build_output \
            -- /tmp/fake_build.sh 2>&1 && echo "RESULT: OK" || echo "RESULT: DENIED"
