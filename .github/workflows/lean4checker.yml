name: lean4checker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lean4checker:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake and elan
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: lean4checker-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lean4checker-

      - name: Fetch Mathlib cache
        run: lake exe cache get

      - name: Build kernel
        run: lake build FLT_Proofs

      - name: Build Verification
        run: lake build Verification

      - name: Run lean4checker on entire kernel
        run: |
          mkdir -p test/verification/CI
          PASS=0
          FAIL=0
          {
            echo "lean4checker --fresh: full kernel replay"
            echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Toolchain: $(cat lean-toolchain)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            for mod in \
              FLT_Proofs.Basic \
              FLT_Proofs.Bridge \
              FLT_Proofs.Complexity \
              FLT_Proofs.Complexity.Amalgamation \
              FLT_Proofs.Complexity.BorelAnalyticBridge \
              FLT_Proofs.Complexity.Compression \
              FLT_Proofs.Complexity.DualVC \
              FLT_Proofs.Complexity.FiniteSupportUC \
              FLT_Proofs.Complexity.GameInfra \
              FLT_Proofs.Complexity.Generalization \
              FLT_Proofs.Complexity.GeneralizationResults \
              FLT_Proofs.Complexity.Interpolation \
              FLT_Proofs.Complexity.Littlestone \
              FLT_Proofs.Complexity.Measurability \
              FLT_Proofs.Complexity.MindChange \
              FLT_Proofs.Complexity.Ordinal \
              FLT_Proofs.Complexity.Rademacher \
              FLT_Proofs.Complexity.Structures \
              FLT_Proofs.Complexity.Symmetrization \
              FLT_Proofs.Complexity.VCDimension \
              FLT_Proofs.Computation \
              FLT_Proofs.Criterion \
              FLT_Proofs.Criterion.Extended \
              FLT_Proofs.Criterion.Gold \
              FLT_Proofs.Criterion.Online \
              FLT_Proofs.Criterion.PAC \
              FLT_Proofs.Data \
              FLT_Proofs.Learner \
              FLT_Proofs.Learner.Active \
              FLT_Proofs.Learner.Bayesian \
              FLT_Proofs.Learner.Closure \
              FLT_Proofs.Learner.Core \
              FLT_Proofs.Learner.Monad \
              FLT_Proofs.Learner.Properties \
              FLT_Proofs.Learner.VersionSpace \
              FLT_Proofs.Process \
              FLT_Proofs.PureMath.AnalyticMeasurability \
              FLT_Proofs.PureMath.ApproxMinimax \
              FLT_Proofs.PureMath.BinaryMatrix \
              FLT_Proofs.PureMath.ChoquetCapacity \
              FLT_Proofs.PureMath.Concentration \
              FLT_Proofs.PureMath.Exchangeability \
              FLT_Proofs.PureMath.FiniteVCApprox \
              FLT_Proofs.PureMath.KLDivergence \
              FLT_Proofs.PureMath.ReaderMonad \
              FLT_Proofs.Theorem \
              FLT_Proofs.Theorem.BorelAnalyticSeparation \
              FLT_Proofs.Theorem.Extended \
              FLT_Proofs.Theorem.Gold \
              FLT_Proofs.Theorem.Online \
              FLT_Proofs.Theorem.PAC \
              FLT_Proofs.Theorem.PACBayes \
              FLT_Proofs.Theorem.Separation \
              Verification.SolutionCrown; do
              echo -n "$mod ... "
              if lake env leanchecker --fresh "$mod" 2>&1; then
                echo "OK"
                PASS=$((PASS + 1))
              else
                echo "FAILED"
                FAIL=$((FAIL + 1))
              fi
            done
            echo ""
            echo "=== Summary ==="
            echo "Passed: $PASS"
            echo "Failed: $FAIL"
            echo "Total:  $((PASS + FAIL))"
          } 2>&1 | tee test/verification/CI/lean4checker_results.txt

      - name: Print axioms for crown jewels
        run: |
          lake env lean Verification/PrintAxioms.lean 2>&1 \
            | tee test/verification/CI/print_axioms_results.txt

      - name: Commit results to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test/verification/CI/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update lean4checker verification results [CI skip]"
          git push

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean4checker-results
          path: test/verification/CI/
