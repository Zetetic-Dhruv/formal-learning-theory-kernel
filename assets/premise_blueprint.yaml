# =============================================================================
# Premise Design Blueprint: From Formalization to Discovery
# =============================================================================
#
# A general methodology for constructing typed premises that enable
# AI-driven proof search to produce not just formalization of known results
# but discovery of new mathematics.
#
# Thesis: A well-designed kernel discovers mathematics through refactoring.
# Infrastructure built to formalize known theorems, when extracted and
# abstracted, generates theorems the premise did not predict.
#
# Validated on: formal-learning-theory-kernel
#   Premise: 42 concept nodes, 5 paradigm joints, 7 structural hypotheses
#   Phase 1 (formalization): 65/67 known theorems closed
#   Phase 2 (discovery): 3 original theorems from measurability refactoring
#   Without structured inquiry: 8/67 closed
#
# =============================================================================

problem_statement: >
  Given an unformalized mathematical field with known theorems, design a
  typed premise and iterative refinement process such that AI-driven proof
  search within the premise (a) formalizes known results, (b) reveals
  structural properties the informal literature suppresses, and
  (c) generates new mathematics through infrastructure extraction.

# =============================================================================
# PRINCIPLES
# =============================================================================

principles:

  premise_scopes_search:
    statement: >
      The premise defines the search space. Proof search operates within
      the premise, not alongside it. Without a premise, AI proof search
      produces vacuous theorems, sorry-in-Prop, and type homogeneity.
    evidence: "8/67 closure rate without structured inquiry vs 65/67 with it"
    implication: >
      The quality of the premise determines the quality of the kernel.
      Investing in premise design has higher ROI than investing in
      proof search capability.

  types_before_proofs:
    statement: >
      All type definitions (structures, typeclasses, theorem statements)
      are written and compiled before proof search begins. The premise
      compiles with every proof as sorry.
    implication: >
      Type errors are caught before proof search is attempted.
      The type checker validates the premise independently of any theorem.

  refactoring_is_hypothesis_generation:
    statement: >
      Every extraction of infrastructure into a separate module is a
      hypothesis: "this infrastructure is more general than the theorem
      that required it." Every typeclass is a hypothesis: "this condition
      applies to more objects than the ones currently carrying it."
      Testing these hypotheses is how formalization becomes discovery.
    evidence: >
      Measurability typeclass extraction (engineering cleanup) produced
      the Borel-analytic separation, interpolation descent, and version
      space measurability theorem. Three original results from one refactoring.

  infrastructure_predicts_discovery:
    statement: >
      The infrastructure ratio (percentage of codebase that is proof
      infrastructure vs theorems vs definitions) predicts where new
      mathematics is likely to emerge. High-infrastructure areas contain
      the most extracted, abstracted, and reusable machinery.
    evidence: >
      56% of the learning theory kernel is proof infrastructure (L5).
      All three original theorems emerged from L5 infrastructure.

# =============================================================================
# PHASE 1: PREMISE FOR FORMALIZATION
# =============================================================================

phase_1_formalization:
  description: >
    Construct a typed premise that enables AI-driven proof search to
    close known theorems. This phase produces a formalization kernel.

  steps:

    1_identify_paradigms:
      description: "List the field's paradigms and classify their relationships"
      procedure:
        - "List subfields or approaches that share vocabulary"
        - "For each pair, determine: do they share proof infrastructure?"
        - "Assign obstruction tag: obstructed (shared vocabulary, no shared proofs) or independent (no interaction)"
      output: "Paradigm list + obstruction matrix"
      general_principle: >
        Any mathematical field with multiple traditions (algebraic vs analytic,
        constructive vs classical, discrete vs continuous) has paradigm joints.
        The obstruction tags predict which definitions can be shared and which
        must be paradigm-specific.
      example:
        field: "Statistical learning theory"
        paradigms: [PAC, Online, Gold]
        matrix:
          PAC_Online: obstructed
          PAC_Gold: obstructed
          Online_Gold: independent

    2_identify_mathematical_domains:
      description: "For each paradigm, identify which mathematical domains its definitions cross"
      procedure:
        - "List the mathematical domains each paradigm's definitions reference"
        - "Identify crossings: definitions that bridge two or more domains"
        - "Predict proof methods from the crossings"
      output: "Domain crossing map"
      general_principle: >
        A paradigm whose definitions cross from domain A to domain B will
        require proof infrastructure that bridges A and B. The infrastructure
        volume is proportional to the distance between domains.
      example:
        PAC: "Combinatorics (VC dimension) x Measure theory (product measures)"
        Online: "Combinatorics (tree depth) x Game theory (adversarial strategies)"
        Gold: "Computability (enumerations) x Topology (pointwise convergence)"

    3_assign_dependency_layers:
      description: "Organize concept nodes into compilation layers"
      procedure:
        - "Layer 0: computation infrastructure (automata, machines)"
        - "Layer 1: base types (the field's atomic definitions)"
        - "Layer 2: data interfaces (how information enters the system)"
        - "Layer 3: agent types (learners, strategies, estimators)"
        - "Layer 4: success criteria (what counts as solving the problem)"
        - "Layer 5: complexity measures + proof infrastructure"
        - "Layer 6: theorems"
        - "Layer 7: processes and applications"
      validation: "lake build succeeds with all proofs as sorry"
      general_principle: >
        The layer structure is field-independent. Every mathematical field
        has atomic types (L1), data interfaces (L2), agents (L3),
        success criteria (L4), complexity measures (L5), and theorems (L6).
        The specific contents of each layer are field-dependent.

    4_write_definitions_with_sorry:
      description: "Write each theorem statement with correct type signature. Proof = sorry."
      general_principle: >
        The type signature IS the premise. It determines what is provable.
        A wrong type signature produces a wrong theorem (failure mode 1),
        a vacuous theorem (failure mode 2), or a misplaced proof (failure mode 3).

    5_check_failure_taxonomy:
      description: "Before proof search, check each definition against three failure modes"

      false_theorem:
        description: "The definition admits a counterexample to the intended characterization"
        diagnostic: "Does the quantifier structure admit more witnesses than the theorem requires?"
        general_check:
          - "Write the theorem's intended proof sketch"
          - "Identify objects the proof treats as 'the same' across parts of the argument"
          - "Verify the definition forces identity, not merely independent existence"
        detection: "Counterexample construction or trivially false proof attempt"
        example:
          field: "Learning theory"
          definition: "Branch-wise Littlestone tree shattering"
          bug: "Independent witnesses per level; const_true/const_false gives LDim = infinity for 1-mistake class"
          fix: "Path-wise restriction: restrict concept class at each recursive call"

      vacuous_theorem:
        description: "The definition makes the theorem trivially true"
        diagnostic: "Can an existentially quantified auxiliary access information the theorem should deny?"
        general_check:
          - "For each existential, trace what information the witness can access"
          - "If the witness can access the target object or answer, the definition leaks"
          - "Replace with a fixed construction that blocks the leak"
        detection: "Unexpectedly short proof, or proof that does not use the hypothesis"
        example:
          field: "Learning theory"
          definition: "PACLearnable with existential Dm"
          bug: "Dm depends on target concept c via memorizer + point mass"
          fix: "Use Measure.pi (product of independent copies)"

      displaced_proof:
        description: "The definition forces proof work into the wrong location"
        diagnostic: "Does the return type encode all properties the theorem's conclusion requires?"
        general_check:
          - "List every property the theorem's conclusion asserts"
          - "For each property, check: encoded in definition, or must be proved separately?"
          - "If separate proof needed, consider encoding in the definition"
        detection: "One direction of a biconditional is unexpectedly harder than the other"
        example:
          field: "Learning theory"
          definition: "MindChangeCount : Nat (count of changes only)"
          bug: "Forward direction requires separate proof of correct convergence"
          fix: "MindChangeOrdinal branches on finiteness AND correctness"

    6_check_domain_boundary:
      description: "Check for cardinality-dependent proof splits"
      general_principle: >
        If the field has both finite and infinite objects, theorems stated
        for 'all X' may be false or trivial for one cardinality.
        The proof methods for finite and infinite cases may be completely disjoint.
      checks:
        - "Identify definitions requiring [Infinite X], [Countable X], [Fintype X]"
        - "Check whether theorems for 'all X' are false for some cardinalities"
        - "Map the tactic split: which Lean4 API surfaces does each branch use?"
      example:
        field: "Learning theory"
        theorem: "No-Free-Lunch"
        bug: "VCDim(Set.univ) = |X| for finite X; Set.univ is PAC-learnable"
        fix: "Require [Infinite X]"

    7_check_measurability:
      description: "If the field involves integration, check measurability requirements"
      general_principle: >
        Any field using probability, expectation, or integration requires
        measurability of the objects being integrated. For uncountable
        indexing sets, measurability is non-trivial and may require
        infrastructure at multiple dependency layers.
      checks:
        - "Identify definitions requiring measurability hypotheses"
        - "Choose level: MeasurableSet (stronger) vs NullMeasurableSet (weaker)"
        - "Check if measurability is trivial (countable/finite) or non-trivial (uncountable)"
        - "Introduce measurability typeclasses early in the layer structure (L1-L3)"
      general_principle_2: >
        NullMeasurableSet is the natural level for composed hypothesis classes.
        MeasurableSet is sufficient for atomic classes but may be unnecessarily
        strong for classes constructed by interpolation or amalgamation.

    8_estimate_infrastructure:
      description: "Predict infrastructure ratio from domain crossing count"
      estimates:
        single_domain: "Infrastructure < 30%"
        two_domain_crossing: "Infrastructure 40-60%"
        three_domain_crossing: "Infrastructure > 60%"
      general_principle: >
        Budget proof search time proportionally. High-infrastructure proofs
        need specialized agents or longer search budgets.

# =============================================================================
# PHASE 2: REFACTORING FOR DISCOVERY
# =============================================================================

phase_2_discovery:
  description: >
    After Phase 1 produces a formalization kernel, iteratively extract,
    name, and abstract infrastructure. Each extraction is a hypothesis
    about generality. Test the hypothesis by looking for new instances,
    new theorems, new connections. This is how formalization becomes discovery.

  steps:

    1_identify_inlined_infrastructure:
      description: "Find mathematical infrastructure that is inlined in proof files"
      procedure:
        - "Look for definitions, lemmas, or proof patterns that serve one theorem but could serve many"
        - "Look for repeated hypothesis threading (the same parameters passed through many theorems)"
        - "Look for proof steps that belong to a different mathematical domain than the theorem"
      signal: >
        If you see the same measurability hypothesis in 8 files, it is a typeclass
        waiting to be extracted. If you see game-theoretic infrastructure in a
        characterization theorem file, it is a module waiting to be separated.

    2_extract_to_modules:
      description: "Move inlined infrastructure to separate files, organized by mathematical domain"
      procedure:
        - "Pure math (independent of the field): PureMath/ folder"
        - "Field-specific infrastructure: within the field's Complexity/ or equivalent"
        - "Each module should compile independently of the theorems it serves"
      hypothesis: >
        Each extraction is a hypothesis: "this infrastructure is more general
        than the theorem that required it." If the module compiles independently,
        the hypothesis is supported.
      example:
        field: "Learning theory"
        extractions:
          - from: "Theorem/Online.lean"
            to: "Complexity/GameInfra.lean"
            content: "Version space, adversary strategy, SOA, mistake counting"
            hypothesis: "Game-theoretic infrastructure is separable from online learning theorems"
          - from: "Complexity/Symmetrization.lean"
            to: "PureMath/Exchangeability.lean"
            content: "Double sample, merge/split, valid splits"
            hypothesis: "Exchangeability infrastructure is field-independent"
          - from: "Theorem/PACBayes.lean"
            to: "PureMath/KLDivergence.lean"
            content: "FinitePMF, KL divergence, cross-entropy, expected value"
            hypothesis: "Information-theoretic infrastructure is field-independent"

    3_introduce_typeclasses:
      description: "Replace repeated hypothesis parameters with typeclasses"
      procedure:
        - "Identify parameters that appear in >3 theorem statements"
        - "Bundle them into a typeclass at the appropriate layer"
        - "Refactor theorem statements to use the typeclass"
      hypothesis: >
        Each typeclass is a hypothesis: "this condition applies to more objects
        than the ones currently carrying it." If new instances exist beyond the
        original theorems, the typeclass is productive.
      signal_of_discovery: >
        If the typeclass has instances you did not expect, the infrastructure
        is generating new structure. Pursue those instances.
      example:
        field: "Learning theory"
        typeclass: "MeasurableBatchLearner"
        original_purpose: "Clean up hypothesis threading in boosting proof"
        unexpected_instance: "Version space learners satisfy it (VersionSpace.lean)"
        discovery: "Non-neural learners are valid RL policy classes"

    4_test_generality:
      description: "For each extracted module, look for theorems it enables beyond the original use"
      procedure:
        - "Ask: does this infrastructure connect to a mathematical domain not in the original premise?"
        - "Ask: does this typeclass have instances from a different paradigm?"
        - "Ask: does this module prove something about COMPOSITION of the field's objects?"
      signal_of_discovery: >
        Composition results are the highest-value discovery targets.
        If the infrastructure proves that composing two well-behaved objects
        produces a less-well-behaved object (measurability descent, interpolation
        weakening), that is a structural theorem about the field.
      example:
        field: "Learning theory"
        infrastructure: "Measurability typeclass hierarchy"
        original_purpose: "Clean up hypothesis threading for uniform convergence"
        discoveries:
          - "Borel-analytic separation: NullMeasurableSet strictly weaker than MeasurableSet"
          - "Interpolation descent: composition of Borel classes weakens measurability"
          - "Version space measurability: non-neural RL policy classes"

    5_iterate:
      description: "After each discovery, return to step 1 and look for more inlined infrastructure"
      general_principle: >
        Discovery is iterative. Each new theorem may inline infrastructure
        that can be extracted. Each extraction may produce new theorems.
        The cycle terminates when no more infrastructure can be productively
        extracted.

# =============================================================================
# DIAGNOSTICS
# =============================================================================

diagnostics:

  phase_1_diagnostics:
    - symptom: "Counterexample found to characterization theorem"
      cause: "Quantifier mismatch in definition"
      question: "Does the definition allow independent witnesses where the theorem needs consistent ones?"
      fix: "Restrict quantifier scope"

    - symptom: "Trivial proof exists for non-trivial theorem"
      cause: "Information leak in existential"
      question: "Can the existential witness access the target object?"
      fix: "Replace existential with fixed construction"

    - symptom: "One proof direction is 10x harder than expected"
      cause: "Return type underspecified"
      question: "Does the return type encode all properties the conclusion requires?"
      fix: "Encode properties in the definition"

    - symptom: "Theorem is false for some cardinalities"
      cause: "Domain cardinality not constrained"
      question: "Does the theorem require [Infinite X] or [Fintype X]?"
      fix: "Add cardinality constraint"

    - symptom: "Proof blocked at measurability step"
      cause: "Missing measurability infrastructure"
      question: "Is the indexing set uncountable? Is the bad event defined by an uncountable existential?"
      fix: "Add NullMeasurableSet infrastructure + typeclass hierarchy"

    - symptom: "Agent produces wrong bound (e.g., 2^{2m} instead of GrowthFunction)"
      cause: "Finite tactics applied to infinite domain"
      question: "Does the goal contain [Infinite X] or uncountable parameters?"
      fix: "Route to domain-appropriate tactic library"

    - symptom: "Quantifier ordering makes theorem unprovable"
      cause: "Uniform vs pointwise convergence conflated"
      question: "Does the output need to be parameter-free (uniform) or parameter-dependent (pointwise)?"
      fix: "Enforce correct quantifier ordering"

  phase_2_diagnostics:
    - symptom: "Same hypothesis parameters appear in >3 theorem statements"
      cause: "Typeclass waiting to be extracted"
      action: "Bundle into typeclass, refactor theorems"

    - symptom: "Proof file contains definitions from a different mathematical domain"
      cause: "Module waiting to be separated"
      action: "Extract to PureMath/ or domain-specific infrastructure file"

    - symptom: "A typeclass has unexpected instances from a different paradigm"
      cause: "Discovery opportunity"
      action: "Prove the instance. Check what theorems it enables."

    - symptom: "Composed objects are less well-behaved than atomic ones"
      cause: "Structural theorem about the field"
      action: "Prove the descent/weakening. This is likely publishable."

    - symptom: "Extracted module compiles independently of the field's theorems"
      cause: "Pure math contribution"
      action: "Check if it belongs in Mathlib or the field's PureMath/ folder"

