  <line x1="270" y1="680" x2="310" y2="680" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="680" x2="610" y2="680" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

