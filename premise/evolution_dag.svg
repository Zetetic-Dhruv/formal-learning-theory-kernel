  <text x="440" y="482" class="intervention-label" text-anchor="middle">backward direction unprovable</text>

  <rect x="610" y="450" width="240" height="50" rx="6" fill="#dc2626"/>
  <text x="730" y="472" class="node-label" fill="white" text-anchor="middle">MindChangeOrdinal:</text>
  <text x="730" y="486" class="node-label" fill="white" text-anchor="middle" font-size="10">Ordinal (encodes correctness)</text>

  <line x1="270" y1="475" x2="310" y2="475" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="475" x2="610" y2="475" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

