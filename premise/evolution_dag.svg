  <rect x="610" y="570" width="240" height="50" rx="6" fill="#2563eb"/>
  <text x="730" y="592" class="node-label" fill="white" text-anchor="middle">VCDim:</text>
  <text x="730" y="606" class="node-label" fill="white" text-anchor="middle" font-size="10">WithTop Nat</text>

  <line x1="270" y1="595" x2="310" y2="595" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="595" x2="610" y2="595" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

