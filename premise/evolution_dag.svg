  <rect x="610" y="840" width="160" height="44" rx="6" fill="#1a3a5c"/>
  <text x="690" y="866" class="node-label" fill="white" text-anchor="middle">Bridge</text>
  <line x1="190" y1="862" x2="610" y2="862" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

