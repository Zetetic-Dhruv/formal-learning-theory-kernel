<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Times New Roman',serif">
  <style>
    text{font-family:'Times New Roman',serif}
  </style>

  <rect width="820" height="440" fill="#fff"/>

  <!-- Title -->
  <text x="270" y="36" font-size="22" font-weight="bold" fill="#000">The Fundamental Theorem of Statistical Learning</text>

  <!-- Pentagon: center (270,210), radius 120 -->
  <!-- v0=top(270,90) v1=UR(384,145) v2=LR(340,290) v3=LL(200,290) v4=UL(156,145) -->

  <!-- Pentagon edges -->
  <line x1="270" y1="90" x2="384" y2="145" stroke="#000" stroke-width="1.2"/>
  <line x1="384" y1="145" x2="340" y2="290" stroke="#000" stroke-width="1.2"/>
  <line x1="340" y1="290" x2="200" y2="290" stroke="#000" stroke-width="1.2"/>
  <line x1="200" y1="290" x2="156" y2="145" stroke="#000" stroke-width="1.2" stroke-dasharray="5 3"/>
  <line x1="156" y1="145" x2="270" y2="90" stroke="#000" stroke-width="1.2" stroke-dasharray="5 3"/>

  <!-- Hub label (no spokes, just text at center) -->
  <text x="270" y="200" font-size="15" font-weight="bold" fill="#000" text-anchor="middle">VCDim(C) &lt; &#x221E;</text>

  <!-- Vertex dots -->
  <circle cx="270" cy="90" r="3.5" fill="#000"/>
  <circle cx="384" cy="145" r="3.5" fill="#000"/>
  <circle cx="340" cy="290" r="3.5" fill="#000"/>
  <circle cx="200" cy="290" r="3.5" fill="#000"/>
  <circle cx="156" cy="145" r="3" fill="none" stroke="#000" stroke-width="1"/>

  <!-- Vertex labels (radially outward) -->
  <text x="270" y="72" font-size="13" font-weight="bold" fill="#000" text-anchor="middle">PAC Learnable  &#x2713;</text>

  <text x="430" y="125" font-size="12" fill="#000" text-anchor="start">Rademacher</text>
  <text x="430" y="140" font-size="12" fill="#000" text-anchor="start">vanishes  &#x2713;</text>

  <text x="380" y="320" font-size="12" fill="#000" text-anchor="start">Growth &#x2264;</text>
  <text x="380" y="335" font-size="12" fill="#000" text-anchor="start">Sauer-Shelah  &#x2713;</text>

  <text x="160" y="320" font-size="12" fill="#000" text-anchor="end">Sample</text>
  <text x="160" y="335" font-size="12" fill="#000" text-anchor="end">complexity  &#x2713;</text>

  <text x="110" y="125" font-size="12" fill="#000" text-anchor="end">Compression</text>
  <text x="110" y="140" font-size="12" fill="#000" text-anchor="end">scheme  &#x25CA;</text>

  <!-- Equivalence note -->
  <text x="270" y="355" font-size="11" fill="#000" text-anchor="middle" font-style="italic">all five &#x21D4; VCDim(C) &lt; &#x221E;</text>

  <!-- Vertical rule -->
  <line x1="535" y1="75" x2="535" y2="410" stroke="#000" stroke-width="0.4"/>

  <!-- Side list -->
  <text x="560" y="96" font-size="13" font-weight="bold" fill="#000">Original proofs</text>

  <text x="560" y="124" font-size="12" fill="#000">Littlestone characterization</text>
  <text x="560" y="139" font-size="11" fill="#000" font-style="italic">Online learnable &#x21D4; LittlestoneDim &lt; &#x221E;</text>

  <line x1="560" y1="151" x2="795" y2="151" stroke="#000" stroke-width="0.3"/>

  <text x="560" y="169" font-size="12" fill="#000">Gold's theorem</text>
  <text x="560" y="184" font-size="11" fill="#000" font-style="italic">Locking sequence on infinite languages</text>

  <line x1="560" y1="196" x2="795" y2="196" stroke="#000" stroke-width="0.3"/>

  <text x="560" y="214" font-size="12" fill="#000">Paradigm separations</text>
  <text x="560" y="229" font-size="11" fill="#000" font-style="italic">PAC &#x21CF; Online  (thresholds on &#x2115;)</text>
  <text x="560" y="244" font-size="11" fill="#000" font-style="italic">Gold &#x21CF; PAC  (finite-subset indicators)</text>
  <text x="560" y="259" font-size="11" fill="#000" font-style="italic">Online &#x2192; PAC  (always)</text>

  <line x1="560" y1="271" x2="795" y2="271" stroke="#000" stroke-width="0.3"/>

  <text x="560" y="289" font-size="12" fill="#000">Universal trichotomy  (2/3 branches)</text>
  <text x="560" y="304" font-size="11" fill="#000" font-style="italic">BHMZ middle branch: sorry</text>

  <line x1="560" y1="316" x2="795" y2="316" stroke="#000" stroke-width="0.3"/>

  <text x="560" y="334" font-size="12" fill="#000">Symmetrization + uniform convergence</text>
  <text x="560" y="349" font-size="11" fill="#000" font-style="italic">3,027 lines, sorry-free</text>

  <line x1="560" y1="361" x2="795" y2="361" stroke="#000" stroke-width="0.3"/>

  <text x="560" y="379" font-size="12" fill="#000">No-Free-Lunch  (infinite domains only)</text>
  <text x="560" y="394" font-size="11" fill="#000" font-style="italic">Provably false for finite X  (textbook correction)</text>

  <!-- Bottom rule + stats -->
  <line x1="20" y1="418" x2="800" y2="418" stroke="#000" stroke-width="0.4"/>
  <text x="410" y="435" font-size="12" fill="#000" font-style="italic" text-anchor="middle">37 files  |  17,350 lines  |  2 sorry  |  Lean 4 + Mathlib4</text>

  <!-- Footnote -->
  <text x="20" y="435" font-size="11.5" fill="#000" font-style="italic">&#x25CA; = forward direction blocked (Moran-Yehudayoff 2016)</text>
</svg>