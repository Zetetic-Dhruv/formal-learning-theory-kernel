<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Times New Roman','Georgia','Palatino',serif">
  <style>
    .title{font-size:22px;font-weight:bold;fill:#111}
    .sub{font-size:13px;fill:#555;font-style:italic}
    .node{font-size:12px;fill:#111;text-anchor:middle}
    .nodeb{font-size:12.5px;fill:#111;text-anchor:middle;font-weight:bold}
    .hub{font-size:14px;fill:#111;text-anchor:middle;font-weight:bold}
    .edge{stroke:#111;stroke-width:1.2;fill:none}
    .sorry-edge{stroke:#111;stroke-width:1.2;fill:none;stroke-dasharray:6 4}
    .side-title{font-size:13px;fill:#111;font-weight:bold}
    .side-item{font-size:11.5px;fill:#333}
    .side-sep{font-size:11.5px;fill:#999}
    .check{font-size:11px;fill:#111}
    .sorry-mark{font-size:11px;fill:#888;font-style:italic}
    .stat{font-size:12px;fill:#555;font-style:italic;text-anchor:middle}
    .footnote{font-size:10px;fill:#888;font-style:italic}
  </style>

  <!-- Background -->
  <rect width="820" height="440" fill="#fff"/>

  <!-- Title -->
  <text x="280" y="36" class="title">The Fundamental Theorem of Statistical Learning</text>
  <text x="280" y="56" class="sub">Five equivalent characterizations of learnability, four proved in Lean 4</text>

  <!-- Pentagram geometry: center at (280, 240), radius 140 -->
  <!-- Pentagon vertices (top, then clockwise):
       v0 (top):        280, 100
       v1 (upper-right): 413, 158
       v2 (lower-right): 362, 313
       v3 (lower-left):  198, 313
       v4 (upper-left):  147, 158
  -->

  <!-- Pentagon edges (outer ring) -->
  <line x1="280" y1="100" x2="413" y2="158" class="edge"/>
  <line x1="413" y1="158" x2="362" y2="313" class="edge"/>
  <line x1="362" y1="313" x2="198" y2="313" class="edge"/>
  <line x1="198" y1="313" x2="147" y2="158" class="edge"/>
  <line x1="147" y1="158" x2="280" y2="100" class="edge"/>

  <!-- Pentagram diagonals (star interior) -->
  <line x1="280" y1="100" x2="362" y2="313" class="edge" stroke-width="0.6" stroke="#bbb"/>
  <line x1="280" y1="100" x2="198" y2="313" class="edge" stroke-width="0.6" stroke="#bbb"/>
  <line x1="413" y1="158" x2="198" y2="313" class="edge" stroke-width="0.6" stroke="#bbb"/>
  <line x1="413" y1="158" x2="147" y2="158" class="sorry-edge" stroke-width="0.6" stroke="#bbb"/>
  <line x1="362" y1="313" x2="147" y2="158" class="edge" stroke-width="0.6" stroke="#bbb"/>

  <!-- Hub: VCDim at center -->
  <circle cx="280" cy="210" r="32" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="280" y="207" class="hub">VCDim(C)</text>
  <text x="280" y="221" class="hub" font-size="12">&lt; ∞</text>

  <!-- Spokes from center to vertices -->
  <line x1="280" y1="178" x2="280" y2="110" class="edge"/>
  <line x1="308" y1="196" x2="403" y2="163" class="edge"/>
  <line x1="305" y1="228" x2="355" y2="305" class="edge"/>
  <line x1="255" y1="228" x2="205" y2="305" class="edge"/>
  <line x1="252" y1="196" x2="157" y2="163" class="edge"/>

  <!-- Vertex labels -->
  <!-- v0: PAC Learnable (top) -->
  <text x="280" y="90" class="nodeb">PAC Learnable</text>
  <text x="280" y="78" class="check">&#x2713;</text>

  <!-- v1: Rademacher (upper-right) -->
  <text x="435" y="148" class="node" text-anchor="start">Rademacher</text>
  <text x="435" y="163" class="node" text-anchor="start">vanishes</text>
  <text x="423" y="148" class="check">&#x2713;</text>

  <!-- v2: Growth function (lower-right) -->
  <text x="372" y="320" class="node" text-anchor="start">Growth &#x2264;</text>
  <text x="372" y="335" class="node" text-anchor="start">Sauer-Shelah</text>
  <text x="362" y="320" class="check">&#x2713;</text>

  <!-- v3: Sample bounds (lower-left) -->
  <text x="188" y="320" class="node" text-anchor="end">Sample</text>
  <text x="188" y="335" class="node" text-anchor="end">complexity</text>
  <text x="198" y="320" class="check" text-anchor="end">&#x2713;</text>

  <!-- v4: Compression (upper-left) -->
  <text x="125" y="148" class="node" text-anchor="end">Compression</text>
  <text x="125" y="163" class="node" text-anchor="end">scheme</text>
  <text x="135" y="148" class="sorry-mark" text-anchor="end">&#x25CA;</text>

  <!-- Dashed line from hub to Compression to mark sorry -->
  <!-- already drawn as spoke above; the sorry-edge on the diagonal marks it -->

  <!-- Vertical rule separating pentagram from side list -->
  <line x1="545" y1="75" x2="545" y2="410" stroke="#ccc" stroke-width="0.8"/>

  <!-- Side: Other proved results -->
  <text x="570" y="95" class="side-title">Also proved</text>

  <text x="570" y="125" class="side-item">Littlestone characterization</text>
  <text x="570" y="140" class="side-sep">Online &#x21D4; LittlestoneDim &lt; &#x221E;</text>

  <line x1="570" y1="152" x2="790" y2="152" stroke="#ddd" stroke-width="0.5"/>

  <text x="570" y="170" class="side-item">Gold's theorem</text>
  <text x="570" y="185" class="side-sep">Locking sequence on infinite languages</text>

  <line x1="570" y1="197" x2="790" y2="197" stroke="#ddd" stroke-width="0.5"/>

  <text x="570" y="215" class="side-item">Paradigm separations (all constructive)</text>
  <text x="570" y="230" class="side-sep">PAC &#x21CF; Online (thresholds on &#x2115;)</text>
  <text x="570" y="245" class="side-sep">Gold &#x21CF; PAC (finite-subset indicators)</text>
  <text x="570" y="260" class="side-sep">Online &#x2192; PAC (always)</text>

  <line x1="570" y1="272" x2="790" y2="272" stroke="#ddd" stroke-width="0.5"/>

  <text x="570" y="290" class="side-item">Universal trichotomy (2/3 branches)</text>
  <text x="570" y="305" class="side-sep">BHMZ middle branch: sorry</text>

  <line x1="570" y1="317" x2="790" y2="317" stroke="#ddd" stroke-width="0.5"/>

  <text x="570" y="335" class="side-item">Symmetrization + uniform convergence</text>
  <text x="570" y="350" class="side-sep">3,027 lines, sorry-free</text>

  <line x1="570" y1="362" x2="790" y2="362" stroke="#ddd" stroke-width="0.5"/>

  <text x="570" y="380" class="side-item">No-Free-Lunch (infinite domains)</text>
  <text x="570" y="395" class="side-sep">False for finite X (textbook correction)</text>

  <!-- Bottom: stats line -->
  <line x1="20" y1="418" x2="800" y2="418" stroke="#ccc" stroke-width="0.8"/>
  <text x="410" y="436" class="stat">31 files  &#x2502;  14,945 lines  &#x2502;  2 sorry  &#x2502;  Lean 4 + Mathlib4</text>

  <!-- Footnote -->
  <text x="20" y="436" class="footnote">&#x25CA; = forward direction blocked (Moran-Yehudayoff 2016)</text>
</svg>